# Rating template for the decision-readiness validation harness.
#
# Save your filled-in copy as:
#   ratings/{doc_id}/{your_rater_id}.yaml
#
# Read rater_guide.md first for the per-dimension anchor
# descriptions. Do NOT read corpus/{doc_id}/profile.json before
# rating; ratings must be blind to Frame Check's computed profile.

# Required identifying fields
doc_id: "REPLACE_WITH_doc_id_FROM_CORPUS"   # must match a corpus/{doc_id}/ entry
rater_id: "REPLACE_WITH_YOUR_SLUG"          # short stable slug, e.g., "alice"
rated_at: "YYYY-MM-DD"                      # ISO date you rated this document

# Per-dimension ratings on a 1-5 scale.
# See rater_guide.md for the operational definition and anchors
# for each dimension. Use `null` (not 0) when the dimension does
# not apply to this document.
ratings:
  coverage: null         # 1=single-perspective, 5=comprehensive
  calibration: null      # 1=severely overconfident, 5=well-calibrated
  evidence: null         # 1=floating assertions, 5=fully sourced
  robustness: null       # 1=fails under scrutiny, 5=robust
  counterfactual: null   # 1=absent, 5=engaged

# Per-dimension notes. Free text. The validation effort uses
# these to interpret divergence cases (where Frame Check's profile
# and expert ratings disagree). Notes are how the methodology
# learns where to revise.
notes:
  coverage: ""
  calibration: ""
  evidence: ""
  robustness: ""
  counterfactual: ""
  overall: ""

# Time spent on this rating, in minutes. Helps calibrate effort
# estimates for future raters.
time_spent_minutes: null

# Optional: any genres OTHER than the corpus-declared one that you
# think apply to this document. Sometimes documents straddle
# genres in ways that matter for calibration. Use values from the
# same vocabulary as metadata.yaml: financial, policy, journalism,
# ai_response, other. Example: a piece declared as "journalism"
# that reads heavily as "ai_response" because it quotes an AI
# verbatim might have ai_response as a secondary genre.
secondary_genres: []

# Optional: confidence in your own rating. 1 = "I am uncertain
# about my anchors here," 5 = "I am highly confident in my rating."
# Useful for weighting expert means and identifying documents
# where the rater asks for a re-review.
self_confidence: null
