[pytest]
# Minimal pytest configuration.
#
# The project uses a mix of standalone-script tests (check() + sys.exit)
# driven by run_tests.py and a smaller set of idiomatic pytest suites.
# See CONTRIBUTING.md for the reasoning behind keeping both patterns.

# Register custom markers used by individual tests so pytest does not
# emit PytestUnknownMarkWarning. Enforcement requires the corresponding
# plugin; the marker here documents intent and is a no-op unless the
# plugin is installed.
markers =
    timeout: soft timeout hint (enforced only when pytest-timeout plugin is installed)

# Keep the default filter permissive; test suites that surface real
# construct-honesty signals (e.g. clarethium_measure UserWarning on
# non-markdown inputs) depend on warnings being visible.
filterwarnings =
    default
