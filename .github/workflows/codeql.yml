name: CodeQL

# GitHub-provided static security analysis. Runs on every PR against
# master, a weekly cron, and on manual dispatch. Findings appear under
# the repository Security tab; PR-time findings block merge if the
# rule is severity-elevated. Zero secrets, zero write permissions:
# this workflow only reads the source tree.
#
# Push-on-master trigger removed 2026-05-07 alongside manual-deployment
# discipline: master pushes happen frequently, the cron already keeps
# the analysis fresh against GitHub rule updates, and PR coverage
# catches every change before merge. The push trigger duplicated cron
# coverage at billing cost.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly Monday 13:00 UTC. Picks up GitHub-published rule updates
    # without waiting for the next push to master. Day chosen so a
    # finding lands at the start of the work week, not over weekends.
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

# Opt into Node.js 24 for JavaScript-based actions; see tests.yml
# for the rationale (June 2nd, 2026 forced default).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # default + security-and-quality query suites. Default
          # covers the high-precision security rules; security-
          # and-quality adds the broader maintainability + style
          # rules that compound code health over time.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
