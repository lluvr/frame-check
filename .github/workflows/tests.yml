name: Tests

# Runs the full Frame Check test suite on every push to master and on
# pull requests. The existing runner is run_tests.py which wraps the
# standalone-script test pattern documented in CONTRIBUTING.md. Rather
# than migrate to pytest in one move, CI respects the existing pattern.

on:
  push:
    branches:
      - master
  pull_request:

# Least-privilege token. Both jobs only check out code and run
# tests; they do not push, comment, or touch other repo state.
# Declaring read-only explicitly pins this even if the repo-level
# default ever shifts back to write-all.
permissions:
  contents: read

# Opt into Node.js 24 for the JavaScript-based actions (checkout,
# setup-python). GitHub forces this default on June 2nd, 2026; opting
# in early removes the deprecation warning from every CI log and
# verifies the actions still work under the newer runtime now,
# rather than at the deadline. Action versions (@v4 / @v5) stay the
# same; only the underlying Node runtime changes.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  # A new push to the same branch cancels the previous run. Prevents
  # CI queue buildup when a contributor pushes corrections quickly.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # The wheel's pyproject `requires-python = ">=3.10"` commits
        # to compatibility across 3.10, 3.11, 3.12. CI verifies that
        # commitment on every push so the claim does not silently
        # drift. Production (Fly Dockerfile) runs 3.12. The 3.10/3.11
        # rows act as compatibility witnesses; failure on the older
        # rows is an honest signal to either bump the floor or fix
        # the incompatibility.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Several test files import pytest at module level (they
          # use pytest fixtures even when the suite is run via
          # run_tests.py). pytest is a dev-only dependency; pinned
          # per the Dockerfile production image having it when the
          # test layer is active.
          pip install pytest

      - name: Run test suite
        run: python3 run_tests.py

  pytest-smoke:
    # Secondary job: direct pytest invocation. Some suites
    # (test_circuit_breaker.py, test_phase1_load.py, test_construct_honesty_voice.py)
    # are idiomatic pytest and run cleanly under direct invocation.
    # Keeps the two invocation paths both verified.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest (idiomatic suites)
        run: |
          # Direct-pytest invocation of suites that are idiomatic
          # pytest (vs the standalone-script pattern most upstream
          # tests follow). Keeps both invocation paths verified.
          # Excluded from this list: test_circuit_breaker.py (imports
          # from `security`, which is web-only and not in the wheel-
          # bundled subset; ships on upstream only) and
          # test_construct_honesty_voice.py (gates on `framing_ai`
          # which is web-only and absent on the public mirror; the
          # primitives the file exercises are still pinned via
          # test_framing_validation.py and the frame-library suite).
          # --cov=. produces a coverage report against every Python
          # module exercised by the three suites. --cov-report=term
          # prints a line-coverage summary in the CI log so a
          # reviewer can read it without clicking into the run.
          # No external service (codecov.io etc.) is wired here:
          # the report lives in the workflow log and the discipline
          # is to keep the percentage stable or rising. A future
          # operator who wants a public badge can wire codecov-action
          # in a follow-up; the in-log report is the floor.
          python3 -m pytest -q \
            --cov=. --cov-report=term \
            tests/test_framing_validation.py \
            tests/test_frame_library.py \
            tests/test_mcp_server.py
