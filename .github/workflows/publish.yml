# Publish workflow.
#
# Triggered on every annotated tag push matching v*. The pipeline:
#
#   1. World-state preflight: verify the destination repository is
#      writable (not archived / disabled / renamed) right before any
#      irreversible step. Refuses to proceed if the destination state
#      has shifted between when the tag was authored and when CI
#      begins; protects against the publish-past-archive class of
#      incident.
#   2. Build the wheel under a fresh CI environment so the artifact
#      is reproducible from public source alone (no operator tree
#      involved).
#   3. Validate: version-sync gate, wheel-content gate, conformance
#      smoke test against the installed wheel in a clean venv.
#   4. Publish to PyPI via Trusted Publishing (OIDC, no API tokens).
#      Pre-release tags (vX.Y.Zrc1, vX.Y.Z.dev0, vX.Y.ZaN, vX.Y.ZbN)
#      go to TestPyPI; final tags go to PyPI.
#   5. Create a GitHub release whose body is the annotated tag message
#      (= the v0.9.x CHANGELOG section by convention) with the wheel +
#      sdist attached. Sigstore attestations attached for provenance.
#
# Trusted Publishing setup (manual, one-time at pypi.org):
#   - https://pypi.org/manage/project/frame-check-mcp/settings/publishing/
#   - Owner: Clarethium, Repository: frame-check, Workflow: publish.yml
#   - Environment: pypi (final), testpypi (pre-release)

name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: World-state preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      destination_writable: ${{ steps.check.outputs.destination_writable }}
    steps:
      - name: Verify destination repo is writable
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # An irreversible publish must not proceed if the destination
          # state has shifted between when the tag was pushed and when
          # CI begins. Specifically refuse when the repo is archived,
          # disabled, or its default branch has changed from `master`.
          # The class of incident this gate closes is the one where a
          # release proceeds against a destination whose state the
          # contributor (or the prior orchestrator) cannot have known.
          set -euo pipefail
          echo "Fetching destination repo state for ${GITHUB_REPOSITORY}..."
          state=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '{archived,disabled,default_branch,visibility}')
          echo "Destination state: ${state}"
          archived=$(echo "${state}" | jq -r .archived)
          disabled=$(echo "${state}" | jq -r .disabled)
          default_branch=$(echo "${state}" | jq -r .default_branch)
          if [ "${archived}" != "false" ]; then
            echo "::error::Destination repo is archived; refusing to publish."
            exit 1
          fi
          if [ "${disabled}" != "false" ]; then
            echo "::error::Destination repo is disabled; refusing to publish."
            exit 1
          fi
          if [ "${default_branch}" != "master" ]; then
            echo "::error::Default branch is '${default_branch}', expected 'master'."
            exit 1
          fi
          echo "destination_writable=true" >> "${GITHUB_OUTPUT}"
          echo "Preflight OK: destination state matches expected."

  build:
    name: Build wheel
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for sigstore attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-sha baking

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bake git SHA into pipeline_version.txt
        run: |
          git rev-parse --short HEAD > pipeline_version.txt
          echo "Baked SHA: $(cat pipeline_version.txt)"

      - name: Verify SERVER_VERSION and pyproject version are in sync
        run: |
          python - <<'PY'
          import re, sys, tomllib
          with open("pyproject.toml", "rb") as f:
              pyver = tomllib.load(f)["project"]["version"]
          text = open("mcp_server.py").read()
          m = re.search(r'^SERVER_VERSION\s*=\s*"([^"]+)"', text, re.MULTILINE)
          codever = m.group(1) if m else None
          if pyver != codever:
              print(f"::error::Version drift: pyproject.toml version={pyver!r}, "
                    f"mcp_server.py SERVER_VERSION={codever!r}. Both must "
                    f"bump together at the publish boundary.", file=sys.stderr)
              sys.exit(1)
          print(f"Versions in sync: {pyver}")
          PY

      - name: Verify tag matches pyproject version
        run: |
          # The tag drives the publish; pyproject must reflect the
          # same version so the wheel name (frame_check_mcp-X.Y.Z.whl)
          # matches the tag (vX.Y.Z). Drift here usually means a
          # forgotten ``cut`` commit.
          python - <<'PY'
          import os, sys, tomllib
          ref = os.environ["GITHUB_REF"]
          assert ref.startswith("refs/tags/v"), f"Unexpected ref: {ref}"
          tag_version = ref.removeprefix("refs/tags/v")
          with open("pyproject.toml", "rb") as f:
              pyver = tomllib.load(f)["project"]["version"]
          if tag_version != pyver:
              print(f"::error::Tag {ref!r} maps to version {tag_version!r}; "
                    f"pyproject.toml version is {pyver!r}.", file=sys.stderr)
              sys.exit(1)
          print(f"Tag matches pyproject: {pyver}")
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade build wheel setuptools

      - name: Build wheel
        run: python -m build --wheel

      - name: Inspect wheel contents
        run: |
          python -c "
          import zipfile, glob
          wheel = glob.glob('dist/*.whl')[0]
          z = zipfile.ZipFile(wheel)
          files = z.namelist()
          print(f'Wheel: {wheel}')
          print(f'Total files: {len(files)}')
          py_modules = [f for f in files if f.endswith('.py') and '/' not in f]
          print(f'Top-level py modules: {len(py_modules)}')
          pkg_files = [f for f in files if f.startswith('framecheck_mcp/')]
          print(f'framecheck_mcp/ items: {len(pkg_files)}')
          required = ['framecheck_mcp/data/frame_library/FVS-001_frame_amplification.md', 'framecheck_mcp/FRAME_DIVERGENCE_CONTRACT_v1.md']
          missing = [r for r in required if r not in files]
          if missing:
              import sys
              sys.exit(f'Missing required files: {missing}')
          print('All required files present.')
          "

      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/fc_smoke
          /tmp/fc_smoke/bin/pip install --quiet dist/*.whl
          /tmp/fc_smoke/bin/frame-check-mcp --version
          /tmp/fc_smoke/bin/python -c "
          from mcp_server import build_epistemic_payload
          p = build_epistemic_payload(
              'Bitcoin gained adoption. Trends compound through 2030.',
              include_divergence=True, domain_hint='finance',
          )
          assert p['provenance']['analysis_cost_usd'] == 0.0
          assert p['divergence']['envelope']['catalog_version'] == 'library_v3'
          assert len(p['divergence']['absent_frames']) > 0
          print('Smoke test passed.')
          "

      - name: Generate sigstore attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.whl'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Pre-release tags only: vX.Y.Z{rc,a,b}N or vX.Y.Z.devN.
    if: |
      contains(github.ref, '.dev') ||
      contains(github.ref, 'rc') ||
      contains(github.ref, 'a') ||
      contains(github.ref, 'b')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/frame-check-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    # Final tags only: exclude pre-release suffixes.
    if: |
      !contains(github.ref, '.dev') &&
      !contains(github.ref, 'rc') &&
      !contains(github.ref, 'a') &&
      !contains(github.ref, 'b')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/frame-check-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract release notes from annotated tag
        id: notes
        run: |
          # Prefer the annotated tag message (which by convention
          # carries the matching CHANGELOG.md section); fall back
          # to the generic message if the tag is lightweight.
          notes=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          if [ -z "${notes}" ]; then
            notes="Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
          fi
          {
            echo 'notes<<EOF'
            echo "${notes}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pre-release if the tag has a dev/rc/a/b suffix.
          extra=()
          case "${GITHUB_REF_NAME}" in
            *.dev*|*rc*|*a[0-9]*|*b[0-9]*) extra+=(--prerelease) ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            "${extra[@]}" \
            dist/*
