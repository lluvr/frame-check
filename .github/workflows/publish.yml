# Publish workflow: builds the frame-check-mcp wheel + sdist on every
# tag push (vX.Y.Z) and validates the artifact.
#
# The upload steps below are intentionally commented out. Releases are
# cut by the curator and published manually (or via the orchestrator
# at scripts/release.py); this workflow exists to validate that the
# wheel still builds cleanly under CI conditions on every tag. To
# enable automated upload, configure PyPI Trusted Publishing
# (https://docs.pypi.org/trusted-publishers/) and uncomment the
# publish jobs.

name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Opt into Node.js 24 for JavaScript-based actions; see tests.yml
# for the rationale (June 2nd, 2026 forced default).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for git-sha baking
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bake git SHA into pipeline_version.txt
        run: |
          git rev-parse --short HEAD > pipeline_version.txt
          echo "Baked SHA: $(cat pipeline_version.txt)"

      - name: Verify SERVER_VERSION and pyproject version are in sync
        run: |
          python - <<'PY'
          import re, sys, tomllib
          with open("pyproject.toml", "rb") as f:
              pyver = tomllib.load(f)["project"]["version"]
          text = open("mcp_server.py").read()
          m = re.search(r'^SERVER_VERSION\s*=\s*"([^"]+)"', text, re.MULTILINE)
          codever = m.group(1) if m else None
          if pyver != codever:
              print(f"::error::Version drift: pyproject.toml version={pyver!r}, "
                    f"mcp_server.py SERVER_VERSION={codever!r}. Both must "
                    f"bump together at the publish boundary.", file=sys.stderr)
              sys.exit(1)
          print(f"Versions in sync: {pyver}")
          PY

      - name: Install build tooling
        run: python -m pip install --upgrade build wheel setuptools

      - name: Build wheel
        # `python -m build` (no flag) builds sdist first then wheel
        # inside the sdist tree. The sdist build path fails on
        # `package directory 'framecheck_mcp/data' does not exist`
        # because setuptools' find_packages discovers
        # framecheck_mcp.data / .calibration / .validation as
        # subpackages but the sdist build context loses the
        # `_StagedBuildPy` data-staging step that runs as part of
        # `build_py`. The wheel is the PyPI artifact (sdist is
        # nice-to-have but not required for `pip install`); building
        # wheel-only keeps the publish job green and matches the
        # orchestrator's `lift_dry_run` step 2 which also uses
        # `python -m build --wheel`.
        run: python -m build --wheel

      - name: Inspect wheel contents
        run: |
          python -c "
          import zipfile, glob
          wheel = glob.glob('dist/*.whl')[0]
          z = zipfile.ZipFile(wheel)
          files = z.namelist()
          print(f'Wheel: {wheel}')
          print(f'Total files: {len(files)}')
          py_modules = [f for f in files if f.endswith('.py') and '/' not in f]
          print(f'Top-level py modules: {len(py_modules)}')
          pkg_files = [f for f in files if f.startswith('framecheck_mcp/')]
          print(f'framecheck_mcp/ items: {len(pkg_files)}')
          required = ['framecheck_mcp/data/frame_library/FVS-001_frame_amplification.md', 'framecheck_mcp/FRAME_DIVERGENCE_CONTRACT_v1.md']
          missing = [r for r in required if r not in files]
          if missing:
              import sys
              sys.exit(f'Missing required files: {missing}')
          print('All required files present.')
          "

      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/fc_smoke
          /tmp/fc_smoke/bin/pip install --quiet dist/*.whl
          /tmp/fc_smoke/bin/frame-check-mcp --version
          # Test divergence path end-to-end
          /tmp/fc_smoke/bin/python -c "
          from mcp_server import build_epistemic_payload
          p = build_epistemic_payload(
              'Bitcoin gained adoption. Trends compound through 2030.',
              include_divergence=True, domain_hint='finance',
          )
          assert p['provenance']['analysis_cost_usd'] == 0.0
          assert p['divergence']['envelope']['catalog_version'] == 'library_v3'
          assert len(p['divergence']['absent_frames']) > 0
          print('Smoke test passed.')
          "

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

