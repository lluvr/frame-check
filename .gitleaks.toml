title = "Frame Check gitleaks configuration"

# Extends gitleaks' default ruleset with patterns specific to the
# providers Frame Check uses for source verification. Default rules
# catch GitHub tokens, Gemini AIzaSy, generic high-entropy patterns,
# etc., but do not catch the three provider keys whose value shapes
# are too short or too low-entropy for generic detection:
#
#   FRED          32-char hex     looks like a hash
#   Alpha Vantage 16-char A-Z0-9  too short for generic rules
#   Wolfram       6+ char A-Z0-9  too short for generic rules
#
# These three custom rules anchor on the env-var name plus a
# realistic value shape, which keeps the false-positive rate near
# zero (an unrelated 32-char hex string elsewhere in the repo will
# not match because it is not preceded by `FRED_API_KEY=`).
#
# The 2026-04-29 leak audit (LEAKAGE_AUDIT_v1.md) found CONTINUATION_PROMPT.md
# committed all four provider keys to private-repo history. These
# rules make a recurrence detectable at commit time. See also the
# `.gitleaksignore` file for the one allowlisted historical leak
# location (which has been scrubbed via filter-repo as of the same
# audit date) and the deliberate test fixtures in detection tests.

[extend]
# Inherit gitleaks' built-in ruleset (GitHub PATs, AWS, Stripe,
# generic high-entropy detectors, etc.). Custom rules below ADD to
# these, do not replace.
useDefault = true

[[rules]]
id = "fred-api-key"
description = "FRED Federal Reserve API key (32-char hex, env-var anchored)"
regex = '''(?i)FRED_API_KEY\s*[:=]\s*['"]?([a-f0-9]{32})['"]?'''
secretGroup = 1
keywords = ["FRED_API_KEY", "fred_api_key"]
[rules.allowlist]
# Allow placeholder/example assignments (empty value, comment-only,
# or "YOUR_KEY_HERE" / "test-..." markers).
regexes = [
  '''FRED_API_KEY\s*=\s*$''',
  '''FRED_API_KEY\s*=\s*#''',
  '''FRED_API_KEY\s*=\s*['"]?(YOUR_KEY_HERE|your_key_here|test[_-].*|example[_-].*|placeholder|<.+>)['"]?''',
  '''FRED_API_KEY\s*=\s*['"]?\$\{?[A-Z_]+\}?['"]?''',
]

[[rules]]
id = "alpha-vantage-api-key"
description = "Alpha Vantage API key (16-char A-Z0-9, env-var anchored)"
regex = '''(?i)ALPHA_VANTAGE_API_KEY\s*[:=]\s*['"]?([A-Z0-9]{16})['"]?'''
secretGroup = 1
keywords = ["ALPHA_VANTAGE_API_KEY", "alpha_vantage_api_key", "ALPHA_VANTAGE_KEY"]
[rules.allowlist]
regexes = [
  '''ALPHA_VANTAGE_API_KEY\s*=\s*$''',
  '''ALPHA_VANTAGE_API_KEY\s*=\s*#''',
  '''ALPHA_VANTAGE_API_KEY\s*=\s*['"]?(YOUR_KEY_HERE|your_key_here|test[_-].*|example[_-].*|placeholder|<.+>|XXXXXXXXXXXXXXXX)['"]?''',
  '''ALPHA_VANTAGE_API_KEY\s*=\s*['"]?\$\{?[A-Z_]+\}?['"]?''',
]

[[rules]]
id = "wolfram-app-id"
description = "Wolfram Alpha App ID (6+ char A-Z0-9 or dashed format, env-var anchored)"
regex = '''(?i)WOLFRAM_APP_ID\s*[:=]\s*['"]?([A-Z0-9]{6,}(?:-[A-Z0-9]{4,})?)['"]?'''
secretGroup = 1
keywords = ["WOLFRAM_APP_ID", "wolfram_app_id", "WOLFRAM_APPID"]
[rules.allowlist]
regexes = [
  '''WOLFRAM_APP_ID\s*=\s*$''',
  '''WOLFRAM_APP_ID\s*=\s*#''',
  '''WOLFRAM_APP_ID\s*=\s*['"]?(YOUR_APP_ID|your_app_id|test[_-].*|example[_-].*|placeholder|<.+>|XXXXXX-XXXXXXXXXX)['"]?''',
  '''WOLFRAM_APP_ID\s*=\s*['"]?\$\{?[A-Z_]+\}?['"]?''',
]

# Catch CONTINUATION_PROMPT-shaped agent-handoff scratchpads being
# committed (these proved to be the leak vector on 2026-04-23).
# Doesn't enforce content rules; just refuses commits that match
# the file-path pattern, since these files are scratch-space and
# should never enter version control.
[[rules]]
id = "agent-handoff-scratchpad"
description = "Agent handoff scratchpad files (should not be committed)"
regex = '''.+''' # match anything in the file content
path = '''(?i)(CONTINUATION_PROMPT|HANDOFF_PROMPT|AGENT_HANDOFF|SESSION_HANDOFF|SCRATCH_PROMPT|AGENT_SCRATCH).*\.md$'''

# Maintainer-internal strategic memos and audit deliverables. Per the
# AGENTS.md "Public-canon discipline" section: docs/internal/, and
# any *_INVENTORY / *_AUDIT / *_VERDICT / *_REMEDIATION / *_OUTREACH /
# *_PROMOTION / *_TIER / METHODOLOGY_PAPER / EXTRACT_POLICY / PUBLICATION_STATE
# patterns are maintainer-side artifacts that must never enter the
# public repo. Discoverable artifacts go through public-canon review;
# everything else stays in the operator workspace.
[[rules]]
id = "maintainer-internal-strategy-doc"
description = "Maintainer-internal strategic memo or audit deliverable"
regex = '''.+'''
path = '''(?i)(^docs/internal/|^|/)([A-Z_]*INVENTORY|[A-Z_]*AUDIT|[A-Z_]*VERDICT|[A-Z_]*REMEDIATION_LOG|[A-Z_]*OUTREACH|[A-Z_]*PROMOTION|ENGINE_TIER_[A-Z_]+|METHODOLOGY_PAPER_[A-Z0-9_]+|METHODOLOGY_V[0-9]+_CANDIDATES_[A-Z0-9_]*|TRACK_[A-Z]_INFORMAL_STUDY_[A-Z0-9_]*|EXTRACT_POLICY|PUBLICATION_STATE_v[0-9]+|RELEASE_PREP_v[0-9]+|verify_publication_state)(_v[0-9]+)?\.(md|sh|py)$'''

# Operator workspace paths. Never commit absolute paths into the
# operator's home directory or vault, regardless of file type.
[[rules]]
id = "operator-home-path"
description = "Absolute path into the operator's home directory"
regex = '''(?i)/home/[a-z0-9._-]+/(frame-check|cma|secrets-vault|clarethium-vault|\.claude|kynerium|sparr-app|vaurith)\b'''
[rules.allowlist]
# Allow the wheel-content scanner in scripts/_release_lib/lift.py to
# encode the leak-detection pattern itself ("if /home/<user> in
# content: fail"). Allow adversarial test fixtures that intentionally
# imitate leaked paths using the fictional /home/example-user/.
regexes = ['''/home/example-user''', '''/home/<user>''', '''/home/llucic" in content''']

# References to the operator's secrets vault by component name.
# "secrets-vault" or "clarethium-vault" anywhere in committed text
# leaks the existence and tooling boundary of the maintainer-side notebook.
# Generic phrases ("local proxy", "credential vault", "encrypted
# at rest") are fine.
[[rules]]
id = "operator-vault-name-reference"
description = "Reference to the operator's secrets-vault by name"
regex = '''(?i)\b(secrets-vault|clarethium-vault)\b'''
[rules.allowlist]
# Allow .gitignore entries that block these patterns to mention them
# (the very patterns this rule blocks need to be named in gitignore
# and gitleaks config).
paths = ['''^\.gitignore$''', '''^\.gitleaks\.toml$''']
